services:
  redis:
    image: redis:8.0.3
    container_name: redis-compare
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - redis_compare_data:/data
    cpuset: "0-3"
    mem_limit: 4g
    memswap_limit: 4g

  vex:
    build:
      context: .
      dockerfile: Dockerfile.vex
    container_name: vex-compare
    command: ["--port", "6380", "--data-dir", "/data", "--no-persistence", "--reactor", "--workers", "4"]
    ports:
      - "16380:6380"
    volumes:
      - vex_compare_data:/data
    cpuset: "4-7"
    mem_limit: 4g
    memswap_limit: 4g

volumes:
  redis_compare_data:
  vex_compare_data:
